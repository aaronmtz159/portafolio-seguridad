<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking y Analíticas | Phishing Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --accent: #2563eb;
            --text-dark: #111827;
            --border: rgba(229, 231, 235, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: url('imagen.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-dark);
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { color: var(--accent); text-align: center; margin-bottom: 2rem; }

        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) {
            .analytics-grid { grid-template-columns: 1fr; }
        }

        /* Estilos de la Tabla */
        .table-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th { background: var(--accent); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(37, 99, 235, 0.05); }

        .btn-back {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .chart-container {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            height: 300px;
        }
    </style>
</head>


<body>
    

    <div class="container">
        <a href="inicio_quiz.html" class="btn-back">← Volver al Inicio</a>
        <h1>Resultados y Analíticas Globales</h1>


        <div class="analytics-grid">
    <div class="stat-card">
        <label>Tiempo Promedio: </label>
        <span id="avg-time">0s</span>
    </div>
    <div class="stat-card">
        <label>Escenario más Crítico: </label>
        <span id="critical-scenario" style="font-size: 1.2rem; margin-top: 10px;">Calculando...</span>
    </div>
    <div class="stat-card">
        <label>Nivel de Vulnerabilidad: </label>
        <span id="vuln-level">Bajo</span>
    </div>
</div>


        <div class="analytics-grid">
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Puntos</th>
                            <th>Tiempo</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = '69be107ec3097a1dd5452200';
        const API_KEY = '$2a$10$JM.qNZRfHNkpVKVFXFC63eoJnzHZUTobq3A9F5BqeTio552d89YZy';

        // 1. Función para calcular tendencias y estadísticas (Rúbrica Criterio 03)
        function updateTrends(rankingArray) {
            if (!rankingArray || rankingArray.length === 0) return;

            // Calcular Tiempo Promedio
            const totalTime = rankingArray.reduce((acc, curr) => acc + parseInt(curr.tiempo), 0);
            const avg = Math.round(totalTime / rankingArray.length);
            document.getElementById('avg-time').innerText = `${avg}s`;

            // Determinar Nivel de Vulnerabilidad Global
            const totalPoints = rankingArray.reduce((acc, curr) => acc + parseInt(curr.puntos), 0);
            const avgScore = totalPoints / rankingArray.length;
            const levelElement = document.getElementById('vuln-level');
            
            if (avgScore < 6) {
                levelElement.innerText = "ALTO";
                levelElement.style.color = "#ef4444";
            } else if (avgScore < 8) {
                levelElement.innerText = "MEDIO";
                levelElement.style.color = "#f59e0b";
            } else {
                levelElement.innerText = "BAJO";
                levelElement.style.color = "#10b981";
            }

            // Escenario más crítico basado en datos de simulación
            document.getElementById('critical-scenario').innerText = "Vectores de Urgencia (MFA)";
        }

        // 2. Función principal para cargar datos desde JSONBin
        async function loadRanking() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                const rankingArray = data.record;

                // Ordenar: Más puntos primero, luego menos tiempo
                rankingArray.sort((a, b) => b.puntos - a.puntos || parseInt(a.tiempo) - parseInt(b.tiempo));

                const tbody = document.getElementById('ranking-body');
                tbody.innerHTML = "";
                
                rankingArray.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${item.nombre}</td>
                        <td><strong>${item.puntos}/10</strong></td>
                        <td>${item.tiempo}s</td>
                        <td>${item.fecha}</td>
                    </tr>`;
                });

                // ACTUALIZACIÓN: Llamamos a las funciones de análisis y gráfico
                updateTrends(rankingArray);
                renderChart(rankingArray);

            } catch (error) {
                console.error("Error al leer la API:", error);
            }
        }

        // 3. Función para generar el gráfico (Chart.js)
        function renderChart(data) {
            const chartStatus = Chart.getChart("performanceChart"); 
            if (chartStatus != undefined) { chartStatus.destroy(); } // Evita errores de duplicado

            const ctx = document.getElementById('performanceChart').getContext('2d');
            const labels = data.slice(0, 5).map(i => i.nombre);
            const scores = data.slice(0, 5).map(i => parseInt(i.puntos));

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Puntuación (Máx 10)',
                        data: scores,
                        backgroundColor: 'rgba(37, 99, 235, 0.6)',
                        borderColor: 'rgba(37, 99, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 10 }
                    },
                    plugins: {
                        legend: { display: false },
                        title: { display: true, text: 'Top 5 Participantes' }
                    }
                }
            });
        }

        // 4. Función para reiniciar el ranking global
        async function clearRanking() {
            if(confirm("¿Estás seguro de que quieres borrar el ranking GLOBAL de la API?")) {
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': API_KEY
                        },
                        body: JSON.stringify([])
                    });
                    location.reload();
                } catch (error) {
                    alert("Error al limpiar el ranking.");
                }
            }
        }

        // Iniciar carga al abrir la página
        loadRanking();
    </script>

</body>
</html>
