<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación: Phishing Quiz | Aaron Mata</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --accent: #2563eb;
            --text-dark: #111827;
            --border: rgba(229, 231, 235, 0.5);
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: url('imagen.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 800px;
            width: 95%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box h2 { font-size: 1.2rem; color: #4b5563; margin-bottom: 0.5rem; }
        .scenario-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text-dark); }

        .options-grid { display: grid; gap: 1rem; }

        .option-btn {
            padding: 1rem;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover { border-color: var(--accent); background: rgba(37, 99, 235, 0.05); }

        /* Pantalla Final */
        #result-screen { display: none; text-align: center; }
        .final-score { font-size: 3rem; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div class="question-box">
                <h2 id="question-number">Pregunta 1 de 10</h2>
                <p id="scenario-text" class="scenario-text">Cargando escenario...</p>
                <div id="options-container" class="options-grid">
                    </div>
            </div>
        </div>

        <div id="result-screen">
            <h1>¡Simulación Completada!</h1>
            <p>Tu puntuación final es:</p>
            <div class="final-score" id="display-score">0/10</div>
            <p style="margin-top: 1.5rem; color: #64748b;">Tus resultados han sido registrados en el ranking global.</p>
            <br>
            <a href="phishing-ranking.html" style="color: var(--accent); font-weight: 600; text-decoration: none;">Ir a Ranking y Analíticas →</a>
        </div>
    </div>

    <script>
        const scenarios = [
            { q: "Recibes un correo de 'Soporte IT' pidiendo tu contraseña para una actualización urgente.", a: ["Es Phishing", "Es Legítimo"], correct: 0 },
            { q: "Un mensaje de Teams de un colega pide un código que te llegó por SMS.", a: ["Proporcionar código", "Desconfiar y reportar"], correct: 1 },
            { q: "Netflix te envía un mail diciendo que tu pago falló, el enlace es 'netfIix-pagos.com'.", a: ["Actualizar datos", "Cerrar y reportar"], correct: 1 },
            { q: "Recibes un archivo 'Factura_Marzo.zip' de un remitente desconocido.", a: ["No abrir", "Abrir para revisar"], correct: 0 },
            { q: "Tu jefe te pide por WhatsApp comprar tarjetas de regalo para un cliente urgente.", a: ["Comprarlas", "Llamar al jefe para confirmar"], correct: 1 },
            { q: "Un popup dice que tu PC tiene 15 virus y debes descargar un limpiador.", a: ["Descargar", "Cerrar navegador"], correct: 1 },
            { q: "Un correo de RR.HH. tiene un PDF con los nuevos salarios, pero pide habilitar macros.", a: ["Habilitar macros", "No habilitar"], correct: 1 },
            { q: "LinkedIn te envía un mail avisando de un nuevo mensaje; el link va a linkedin.com.", a: ["Es Legítimo", "Es Phishing"], correct: 0 },
            { q: "El banco te llama pidiendo tu NIP para cancelar una compra no reconocida.", a: ["Dar NIP", "Colgar"], correct: 1 },
            { q: "Recibes una oferta de trabajo increíble de una empresa que no conoces vía Telegram.", a: ["Ignorar", "Mandar CV"], correct: 0 }
        ];

        let currentQuestion = 0;
        let score = 0;
        const startTime = Date.now();

        function loadQuestion() {
            const q = scenarios[currentQuestion];
            document.getElementById('question-number').innerText = `Pregunta ${currentQuestion + 1} de 10`;
            document.getElementById('scenario-text').innerText = q.q;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / 10) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            if (index === scenarios[currentQuestion].correct) score++;
            currentQuestion++;
            if (currentQuestion < scenarios.length) {
                loadQuestion();
            } else {
                finishQuiz();
            }
        }

        const BIN_ID = '69be107ec3097a1dd5452200';
        const API_KEY = '$2a$10$JM.qNZRfHNkpVKVFXFC63eoJnzHZUTobq3A9F5BqeTio552d89YZy';

async function finishQuiz() {
    const endTime = Date.now();
    const totalTime = Math.floor((endTime - startTime) / 1000);
    const userName = localStorage.getItem('currentPlayer') || "Anónimo";
    
    const newScore = {
        nombre: userName,
        puntos: score,
        tiempo: totalTime,
        fecha: new Date().toLocaleDateString()
    };

    try {
        // 1. Obtener datos actuales
        const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { 'X-Master-Key': API_KEY }
        });
        const data = await response.json();
        let ranking = data.record;

        // 2. Agregar el nuevo y limitar a los mejores 50 para no saturar el JSON
        ranking.push(newScore);
        
        // 3. Guardar de nuevo en la API
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': API_KEY
            },
            body: JSON.stringify(ranking)
        });

        // Mostrar pantalla final
        document.getElementById('quiz-screen').style.display = "none";
        document.getElementById('result-screen').style.display = "block";
        document.getElementById('display-score').innerText = `${score}/10`;
    } catch (error) {
        console.error("Error al guardar en la API:", error);
        alert("Hubo un error al guardar tu puntaje global.");
    }
}

        loadQuestion();
    </script>
</body>
</html>
